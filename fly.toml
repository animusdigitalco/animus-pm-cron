# Animus PM cron — lightweight, no-LLM version of Pat that runs only the
# monthly Trello marketing card creation. Fires on Fly's `monthly` schedule.
#
# Deploy:  fly deploy
# Schedule the cron machine:
#   fly machine run --schedule monthly --region ord registry.fly.io/animus-pm-cron:latest

app = 'animus-pm-cron'
primary_region = 'ord'

[build]

# No [http_service] — this is a one-shot cron, not a web app.

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
